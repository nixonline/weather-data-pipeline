id: weather-data-extract
namespace: prod

inputs:
  - id: load_historic
    type: BOOL
    defaults: false
  - id: start_date
    type: STRING
    required: false
  - id: end_date
    type: STRING
    required: false

tasks:
  - id: extract
    type: io.kestra.plugin.docker.Run
    containerImage: "{{ envs.extractor_image }}"
    pullPolicy: ALWAYS
    credentials:
      registry: asia-southeast1-docker.pkg.dev
      username: _json_key
      password: "{{ envs.gcp_service_key }}"
    env:
      GCS_BUCKET: "{{ envs.gcs_bucket }}"
      GCP_SERVICE_KEY: "{{ envs.gcp_service_key }}"
    commands:
      - "{{ inputs.load_historic ? '--load-historic' : '' }}"
      - "{{ inputs.start_date ? '--start-date=' ~ inputs.start_date : '' }}"
      - "{{ inputs.end_date ? '--end-date=' ~ inputs.end_date : '' }}"
