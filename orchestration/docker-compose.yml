services:
  kestra:
    image: kestra/kestra:latest-lts
    container_name: weather-kestra
    user: root
    ports:
      - "8080:8080"
    volumes:
      - kestra_storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - ./flows:/app/flows
      - /tmp:/tmp
    environment:
      ENV_EXTRACTOR_IMAGE: ${EXTRACTOR_IMAGE}
      ENV_TRANSFORMER_IMAGE: ${TRANSFORMER_IMAGE}
      ENV_GCS_BUCKET: ${GCS_BUCKET}
      ENV_GCP_SERVICE_KEY: ${GCP_SERVICE_KEY}
      KESTRA_CONFIGURATION: |
        kestra:
          url: http://localhost:8080/
          storage:
            type: local
            local:
              base-path: /app/storage
          queue:
            type: h2
          repository:
            type: h2
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp
          variables:
            env-vars-prefix: ENV_
        micronaut:
          io:
            watch:
              enabled: true
              paths:
                - /app/flows
    command: server local

volumes:
  kestra_storage:
